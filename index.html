<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мерчендайзер</title>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#f4f4f4;
padding:15px;
max-width:900px;
margin:auto;
}

h1{
font-size:24px;
margin-bottom:15px;
}

.tabs{
display:flex;
gap:8px;
overflow-x:auto;
margin-bottom:15px;
}

.tab{
border:none;
padding:12px;
border-radius:12px;
background:white;
cursor:pointer;
white-space:nowrap;
}

.active{
background:#0a84ff;
color:white;
}

.card{
background:white;
border-radius:16px;
padding:12px;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:12px;
margin-bottom:8px;
font-size:16px;
}

.btn{
border:none;
border-radius:12px;
padding:12px;
cursor:pointer;
}

.blue{
background:#0a84ff;
color:white;
}

.red{
background:#ff3b30;
color:white;
}

.green{
background:#34c759;
color:white;
}

.product{
padding:12px;
border-bottom:1px solid #eee;
}

.product:last-child{
border-bottom:none;
}

.product.done{
background:#e8ffe8;
border-radius:12px;
}

.name{
font-weight:600;
margin-bottom:10px;
}

.controls{
display:flex;
align-items:center;
gap:6px;
flex-wrap:wrap;
}

.counter{
font-size:20px;
font-weight:700;
width:45px;
text-align:center;
}

.small{
padding:8px 10px;
}

.total{
font-size:20px;
font-weight:bold;
text-align:center;
padding:15px;
}

.check{
margin-top:10px;
display:flex;
align-items:center;
gap:8px;
}
</style>
</head>

<body>

<h1>Товары на выкладку</h1>

<div id="tabs" class="tabs"></div>

<div class="card">
<input id="newProduct" placeholder="Название товара">
<button class="btn blue" onclick="addProduct()">
Добавить товар
</button>
</div>

<div class="card">
<button class="btn red" onclick="resetStore()">
Сбросить магазин
</button>
</div>

<div id="products"></div>

<div class="card total">
Всего нужно принести:
<span id="total">0</span>
</div>

<script>

const stores=[
"Таир Южный",
"Березка Аян",
"Оптима Ермекова",
"Южный Гармошка"
];

let currentStore=
localStorage.getItem("currentStore") ||
stores[0];

let db=
JSON.parse(
localStorage.getItem("merchDB") || "{}"
);

stores.forEach(store=>{
if(!db[store]){
db[store]={};
}
});

function save(){
localStorage.setItem(
"merchDB",
JSON.stringify(db)
);

localStorage.setItem(
"currentStore",
currentStore
);
}

function renderTabs(){

let html="";

stores.forEach(store=>{

html+=`
<button
class="tab ${store===currentStore?'active':''}"
onclick="switchStore('${store}')">
${store}
</button>
`;

});

document.getElementById("tabs").innerHTML=
html;
}

function switchStore(store){
currentStore=store;
save();
render();
}

function addProduct(){

const input=
document.getElementById("newProduct");

const name=
input.value.trim();

if(!name) return;

stores.forEach(store=>{

if(!db[store][name]){

db[store][name]={
count:0,
taken:false
};

}

});

input.value="";

save();
render();
}

function change(product,val){

db[currentStore][product].count += val;

if(
db[currentStore][product].count < 0
){
db[currentStore][product].count=0;
}

save();
render();
}

function toggleTaken(product){

db[currentStore][product].taken=
!db[currentStore][product].taken;

save();
render();
}

function removeProduct(product){

if(!confirm("Удалить товар?"))
return;

stores.forEach(store=>{
delete db[store][product];
});

save();
render();
}

function resetStore(){

if(!confirm("Сбросить магазин?"))
return;

Object.keys(
db[currentStore]
).forEach(product=>{

db[currentStore][product]={
count:0,
taken:false
};

});

save();
render();
}

function renderProducts(){

let html="";
let total=0;

Object.keys(
db[currentStore]
)
.sort()
.forEach(product=>{

const item=
db[currentStore][product];

total+=item.count;

html+=`

<div class="card product ${item.taken?'done':''}">

<div class="name">
${product}
</div>

<div class="controls">

<button
class="btn small"
onclick="change('${product}',-1)">
-1
</button>

<div class="counter">
${item.count}
</div>

<button
class="btn small blue"
onclick="change('${product}',1)">
+1
</button>

<button
class="btn small green"
onclick="change('${product}',5)">
+5
</button>

<button
class="btn small red"
onclick="removeProduct('${product}')">
🗑
</button>

</div>

<div class="check">

<input
type="checkbox"
${item.taken?'checked':''}
onclick="toggleTaken('${product}')">

<label>
Взято со склада
</label>

</div>

</div>

`;

});

document.getElementById("products").innerHTML=
html;

document.getElementById("total").textContent=
total;
}

function render(){
renderTabs();
renderProducts();
}

render();

</script>

</body>
</html>

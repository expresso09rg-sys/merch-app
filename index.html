<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Merch Tracker 2.0</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#f59e0b">

<link rel="icon" href="icon.svg">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Merch Tracker">

<style>

:root{
--primary:#f59e0b;
--green:#22c55e;
--red:#ef4444;
--blue:#3b82f6;
--bg:#f3f4f6;
--card:#ffffff;
--text:#111827;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
padding:12px;
padding-bottom:90px;
max-width:900px;
margin:auto;
}

.header{
background:white;
padding:16px;
border-radius:18px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
margin-bottom:12px;
}

.title{
font-size:26px;
font-weight:700;
}

.subtitle{
margin-top:6px;
font-size:14px;
color:#666;
}

.card{
background:white;
padding:14px;
border-radius:18px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
margin-bottom:12px;
}

.input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:14px;
font-size:16px;
margin-bottom:8px;
}

.btn{
border:none;
padding:12px;
border-radius:14px;
font-size:15px;
font-weight:700;
cursor:pointer;
}

.btn-primary{
background:var(--primary);
color:white;
}

.btn-green{
background:var(--green);
color:white;
}

.btn-red{
background:var(--red);
color:white;
}

.btn-blue{
background:var(--blue);
color:white;
}

.tabs{
display:flex;
gap:8px;
overflow-x:auto;
}

.tab{
border:none;
padding:12px 16px;
border-radius:14px;
background:#e5e7eb;
font-weight:700;
white-space:nowrap;
cursor:pointer;
}

.tab.active{
background:var(--primary);
color:white;
}

.product{
background:white;
padding:14px;
border-radius:18px;
margin-bottom:10px;
box-shadow:0 2px 10px rgba(0,0,0,.06);
}

.product.done{
background:#e8ffe8;
}

.product-name{
font-weight:700;
font-size:18px;
margin-bottom:12px;
}

.counter-row{
display:flex;
gap:6px;
align-items:center;
margin-bottom:10px;
}

.counter{
min-width:60px;
text-align:center;
font-size:24px;
font-weight:700;
}

.small-btn{
border:none;
padding:10px;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

.total-box{
text-align:center;
font-size:24px;
font-weight:700;
}

.hidden{
display:none;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:10px;
display:flex;
gap:10px;
box-shadow:0 -2px 10px rgba(0,0,0,.08);
}

.nav-btn{
flex:1;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.day{
background:white;
padding:12px;
border-radius:12px;
text-align:center;
cursor:pointer;
}

.day.saved{
background:#f59e0b;
color:white;
font-weight:700;
}

.history-details{
margin-top:12px;
}

.store-block{
margin-bottom:12px;
padding:10px;
background:#fafafa;
border-radius:12px;
}

</style>

</head>

<body>

<div class="header">

<div class="title">
🍺 Merch Tracker 2.0
</div>

<div
class="subtitle"
id="todayLabel">
</div>

</div>

<div
id="workScreen">

<div class="card">

<input
id="productInput"
class="input"
placeholder="Добавить товар">

<button
class="btn btn-primary"
onclick="addProduct()">
Добавить товар
</button>

</div>

<div class="card">

<input
id="tempStoreInput"
class="input"
placeholder="Добавить магазин на сегодня">

<button
class="btn btn-blue"
onclick="addTempStore()">
Добавить магазин
</button>

</div>

<div class="card">

<input
id="searchInput"
class="input"
placeholder="Поиск товара">

<select
id="sortSelect"
class="input">

<option value="qtyDesc">
Количество ↓
</option>

<option value="qtyAsc">
Количество ↑
</option>

<option value="alpha">
По алфавиту
</option>

</select>

<label>

<input
type="checkbox"
id="onlyNeeded">

Только нужные товары

</label>

</div>

<div class="card">

<div
id="storeTabs"
class="tabs">
</div>

</div>

<div
id="productList">
</div>

<div class="card">

<div
class="total-box">

Всего нужно принести:

<span
id="totalCount">

0

</span>

</div>

</div>

</div>

<div
id="historyScreen"
class="hidden">

<div class="card">

<div
id="calendar">
</div>

</div>

<div
id="historyContent">
</div>

</div>

<div class="bottom-nav">

<button
class="btn btn-primary nav-btn"
onclick="showWorkScreen()">

Работа

</button>

<button
class="btn btn-primary nav-btn"
onclick="showHistoryScreen()">

История

</button>

</div>

<script>

const BASE_STORES = [
    "Таир Южный",
    "Березка Аян",
    "Оптима Ермекова",
    "Южный Гармошка"
];

const today =
new Date()
.toISOString()
.slice(0,10);

let app =
JSON.parse(
localStorage.getItem(
"MERCH_TRACKER_2"
) || "{}"
);

if(!app.catalog)
app.catalog = [];

if(!app.days)
app.days = {};

if(!app.history)
app.history = [];

if(!app.days[today]){

    app.days[today] = {

        stores:{}

    };

    BASE_STORES.forEach(
    store=>{

        app.days[today]
        .stores[store] = {};

        app.catalog.forEach(
        product=>{

            app.days[today]
            .stores[store]
            [product] = {

                count:0,
                taken:false

            };

        });

    });

}

let currentStore =
Object.keys(
app.days[today]
.stores
)[0];

function saveData(){

    localStorage.setItem(
    "MERCH_TRACKER_2",
    JSON.stringify(app)
    );

}

function updateHeader(){

    document
    .getElementById(
    "todayLabel"
    )
    .innerHTML =

    "Сегодня: " +

    new Date()
    .toLocaleDateString(
    "ru-RU"
    );

}

function showWorkScreen(){

    document
    .getElementById(
    "workScreen"
    )
    .classList
    .remove(
    "hidden"
    );

    document
    .getElementById(
    "historyScreen"
    )
    .classList
    .add(
    "hidden"
    );

}

function showHistoryScreen(){

    document
    .getElementById(
    "workScreen"
    )
    .classList
    .add(
    "hidden"
    );

    document
    .getElementById(
    "historyScreen"
    )
    .classList
    .remove(
    "hidden"
    );

    renderCalendar();

}

function ensureProductEverywhere(
product
){

Object.values(
app.days
)
.forEach(day=>{

Object.values(
day.stores
)
.forEach(store=>{

if(
!store[product]
){

store[product] = {

count:0,
taken:false

};

}

});

});

}

function addProduct(){

const input =
document
.getElementById(
"productInput"
);

const product =
input.value.trim();

if(!product)
return;

if(
app.catalog.includes(
product
)
)
return;

app.catalog.push(
product
);

ensureProductEverywhere(
product
);

input.value = "";

saveData();

renderProducts();

}

function deleteProduct(
product
){

if(
!confirm(
"Удалить товар?"
)
)
return;

app.catalog =
app.catalog.filter(
p =>
p !== product
);

Object.values(
app.days
)
.forEach(day=>{

Object.values(
day.stores
)
.forEach(store=>{

delete store[
product
];

});

});

saveData();

renderProducts();

}

function addTempStore(){

const input =
document
.getElementById(
"tempStoreInput"
);

const store =
input.value.trim();

if(!store)
return;

if(
app.days[today]
.stores[store]
)
return;

app.days[today]
.stores[store] = {};

app.catalog.forEach(
product=>{

app.days[today]
.stores[store]
[product] = {

count:0,
taken:false

};

});

input.value = "";

saveData();

renderStores();

}

function deleteStore(
store
){

if(
BASE_STORES.includes(
store
)
){

alert(
"Основной магазин удалить нельзя"
);

return;

}

if(
!confirm(
"Удалить магазин?"
)
)
return;

delete
app.days[today]
.stores[store];

currentStore =
Object.keys(
app.days[today]
.stores
)[0];

saveData();

renderStores();
renderProducts();

}

function renderStores(){

let html = "";

Object.keys(
app.days[today]
.stores
)
.forEach(store=>{

html += `

<div
style="
display:flex;
gap:6px;
align-items:center;
">

<button

class="tab
${store===currentStore
?
'active'
:
''
}"

onclick="
switchStore(
'${store}'
)
">

${store}

</button>

${
!BASE_STORES.includes(
store
)

?

`

<button

class="
btn
btn-red
"

onclick="
deleteStore(
'${store}'
)
">

🗑

</button>

`

:

''

}

</div>

`;

});

document
.getElementById(
"storeTabs"
)
.innerHTML = html;

}

function switchStore(
store
){

currentStore =
store;

renderStores();
renderProducts();

}

function changeCount(
product,
value
){

const item =
app.days[today]
.stores[currentStore]
[product];

item.count += value;

if(
item.count < 0
){
item.count = 0;
}

saveData();

renderProducts();

}

function toggleTaken(
product
){

const item =
app.days[today]
.stores[currentStore]
[product];

item.taken =
!item.taken;

saveData();

renderProducts();

}

function renderProducts(){

const search =
document
.getElementById(
"searchInput"
)
.value
.toLowerCase();

const onlyNeeded =
document
.getElementById(
"onlyNeeded"
)
.checked;

const sort =
document
.getElementById(
"sortSelect"
)
.value;

let products =
[...app.catalog];

products =
products.filter(
product=>
product
.toLowerCase()
.includes(
search
)
);

if(
onlyNeeded
){

products =
products.filter(
product=>

app.days[today]
.stores[currentStore]
[product]
.count > 0

);

}

if(
sort==="alpha"
){
products.sort();
}

if(
sort==="qtyDesc"
){

products.sort(
(a,b)=>

app.days[today]
.stores[currentStore]
[b]
.count

-

app.days[today]
.stores[currentStore]
[a]
.count

);

}

if(
sort==="qtyAsc"
){

products.sort(
(a,b)=>

app.days[today]
.stores[currentStore]
[a]
.count

-

app.days[today]
.stores[currentStore]
[b]
.count

);

}

let html = "";
let total = 0;

products.forEach(
product=>{

const item =
app.days[today]
.stores[currentStore]
[product];

total +=
item.count;

html += `

<div class="
product
${item.taken ? 'done' : ''}
">

<div class="
product-name
">

${product}

</div>

<div class="
counter-row
">

<button
class="
small-btn
"
onclick="
changeCount(
'${product}',
-1
)
">
-1
</button>

<div class="
counter
">
${item.count}
</div>

<button
class="
small-btn
"
onclick="
changeCount(
'${product}',
1
)
">
+1
</button>

<button
class="
small-btn
"
onclick="
changeCount(
'${product}',
5
)
">
+5
</button>

<button
class="
small-btn
"
onclick="
changeCount(
'${product}',
10
)
">
+10
</button>

</div>

<div
style="
display:flex;
gap:8px;
">

<button

class="
btn
${item.taken
?
'btn-green'
:
'btn-red'
}
"

onclick="
toggleTaken(
'${product}'
)
">

${item.taken
?
'🟢 Взято'
:
'🔴 Не взято'
}

</button>

<button

class="
btn
btn-red
"

onclick="
deleteProduct(
'${product}'
)
">

🗑

</button>

</div>

</div>

`;

});

document
.getElementById(
"productList"
)
.innerHTML =
html;

document
.getElementById(
"totalCount"
)
.innerText =
total;

}

function saveDay(){

const snapshot = {

date:
new Date()
.toLocaleDateString(
'ru-RU'
),

stores:{}

};

Object.entries(
app.days[today]
.stores
)
.forEach(
([store,items])=>{

const filtered =
{};

Object.entries(
items
)
.forEach(
([product,data])=>{

if(
data.count > 0
){

filtered[
product
] =
data.count;

}

});

if(
Object.keys(
filtered
).length
){

snapshot.stores[
store
] =
filtered;

}

});

app.history.push(
snapshot
);

saveData();

alert(
"День сохранён"
);

}

function renderCalendar(){

let html = `
<div class="card">

<button
class="
btn
btn-green
"
onclick="
saveDay()
">
💾 Сохранить день
</button>

</div>
`;

app.history
.slice()
.reverse()
.forEach(
day=>{

let content = "";

Object.entries(
day.stores
)
.forEach(
([store,items])=>{

content += `
<div class="
store-block
">

<h4>
${store}
</h4>
`;

Object.entries(
items
)
.forEach(
([product,count])=>{

content += `
${product}
 — 
${count}
<br>
`;

});

content += `
</div>
`;

});

html += `

<details
class="
calendar-date
">

<summary>

📅
${day.date}

</summary>

<div class="
history-details
">

${content}

</div>

</details>

`;

});

document
.getElementById(
"calendar"
)
.innerHTML =
html;

}

function exportBackup(){

const blob =
new Blob(

[
JSON.stringify(
app,
null,
2
)
],

{
type:
'application/json'
}

);

const a =
document
.createElement(
'a'
);

a.href =
URL
.createObjectURL(
blob
);

a.download =
'merch_backup.json';

a.click();

}

function importBackup(
event
){

const file =
event.target.files[0];

if(!file)
return;

const reader =
new FileReader();

reader.onload =
function(e){

app =
JSON.parse(
e.target.result
);

saveData();

location.reload();

};

reader.readAsText(
file
);

}

updateHeader();

renderStores();

renderProducts();

document
.getElementById(
"searchInput"
)
.addEventListener(
"input",
renderProducts
);

document
.getElementById(
"sortSelect"
)
.addEventListener(
"change",
renderProducts
);

document
.getElementById(
"onlyNeeded"
)
.addEventListener(
"change",
renderProducts
);

</script>

</body>
</html>
